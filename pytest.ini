[pytest]
testpaths = tests
python_files = test_*.py
# 收集阶段勿误入大包目录（减轻卡顿；主要入口已由 testpaths 限定）
norecursedirs = .git .venv venv env _build build dist node_modules Snet PCN data checkpoints wandb input gt meta obs_w debug results

# 当 PYTHONPATH 含 ROS 时，setuptools 会加载 launch_testing 等 pytest11 入口；
# 若未安装 lark 会在收集前失败。见 tests/conftest.py 顶部说明。
# Cursor/终端长时间卡住时请先：export PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
